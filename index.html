<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>&#127801; para a Kamilly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{ --gold:#f3cd7f; --gold-soft:#e8b968; --red:#e11d3a; --rose:#ff5a7a; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#000;overflow:hidden}
  body{font-family:'Cormorant Garamond',serif;color:var(--gold);-webkit-font-smoothing:antialiased;
    touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
  .stage{position:fixed;inset:0;height:100dvh;width:100vw;overflow:hidden;
    background:radial-gradient(120% 90% at 50% 44%, #170409 0%, #08010a 48%, #000 100%)}
  #fx{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}
  .vig{position:absolute;inset:0;z-index:4;pointer-events:none;
    background:radial-gradient(135% 100% at 50% 48%, transparent 48%, rgba(0,0,0,.78) 100%)}

  .scene{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:clamp(6px,2.6vh,26px);padding:6vh 8vw;text-align:center;
    opacity:0;visibility:hidden;transition:opacity 1.15s ease, visibility 1.15s}
  .scene.on{opacity:1;visibility:visible}

  /* ---------- rosa ---------- */
  .glow-red{position:absolute;width:80vmin;height:80vmin;border-radius:50%;
    background:radial-gradient(circle, rgba(225,29,58,.34), rgba(122,11,30,.1) 44%, transparent 70%);filter:blur(12px);opacity:0}
  .sc-rose.on .glow-red{opacity:1;animation:pulseGlow 5s ease-in-out infinite 1s}
  @keyframes pulseGlow{0%,100%{transform:scale(1);opacity:.75}50%{transform:scale(1.14);opacity:1}}
  .rose-holder{position:relative;width:min(64vw,36vh);height:min(64vw,36vh);display:grid;place-items:center}
  .rose-fit{position:absolute;width:380px;height:380px;transform:scale(var(--s,.6));transform-origin:center}
  .rose{position:absolute;inset:0}
  .sc-rose.on .rose{animation:breathe 6.5s ease-in-out infinite 2.6s}
  @keyframes breathe{0%,100%{transform:scale(1) rotate(0)}50%{transform:scale(1.035) rotate(1.4deg)}}
  .petal{position:absolute;left:50%;top:50%;width:var(--w);height:var(--h);transform-origin:50% 100%;
    transform:translate(-50%,-100%) rotate(var(--deg)) scale(0);
    border-radius:52% 52% 46% 46% / 70% 70% 32% 32%;
    background:radial-gradient(ellipse at 50% 100%, var(--c2), var(--c1) 66%);
    box-shadow:inset 0 -16px 26px rgba(0,0,0,.45), inset 0 12px 16px rgba(255,255,255,.08);
    opacity:0;animation:bloom 1s cubic-bezier(.2,.9,.25,1) var(--d) forwards;animation-play-state:paused}
  .sc-rose.on .petal{animation-play-state:running}
  @keyframes bloom{0%{opacity:0;transform:translate(-50%,-100%) rotate(calc(var(--deg) - 16deg)) scale(.06)}
    55%{opacity:1}100%{opacity:1;transform:translate(-50%,-100%) rotate(var(--deg)) scale(1)}}
  .tiny{font-style:italic;letter-spacing:.28em;font-size:clamp(14px,4vw,20px);color:var(--gold-soft);opacity:0}
  .sc-rose.on .tiny{animation:soft 2s ease forwards 3.4s}
  @keyframes soft{to{opacity:.85}}

  /* ---------- nome ---------- */
  .pre,.name{opacity:0;filter:blur(12px);transform:translateY(18px)}
  .sc-name.on .pre{animation:rise 1.3s ease forwards .3s}
  .sc-name.on .name{animation:rise 1.8s ease forwards .9s}
  @keyframes rise{to{opacity:1;filter:blur(0);transform:none}}
  .pre{font-style:italic;letter-spacing:.26em;font-size:clamp(15px,4.4vw,23px);color:var(--gold-soft)}
  .name{font-family:'Parisienne',cursive;font-size:clamp(50px,15vw,112px);line-height:1.2;margin-top:.04em;padding:0 .18em;
    background:linear-gradient(180deg,#fff4dd,#f3cd7f 52%,#c9922f);-webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;filter:drop-shadow(0 0 22px rgba(243,205,127,.55)) drop-shadow(0 2px 3px rgba(0,0,0,.6))}

  /* ---------- declaracao ---------- */
  .dl{opacity:0;filter:blur(8px);transform:translateY(14px);font-style:italic;
    font-size:clamp(20px,5.6vw,34px);color:#f7e6c2;line-height:1.35;text-shadow:0 0 18px rgba(243,205,127,.2)}
  .sc-decl.on .dl1{animation:rise 1.4s ease forwards .3s}
  .sc-decl.on .dl2{animation:rise 1.4s ease forwards 1.9s}
  .sc-decl.on .dl3{animation:rise 1.6s ease forwards 3.5s}
  .dl3{font-family:'Parisienne',cursive;font-style:normal;font-size:clamp(33px,10vw,64px);line-height:1.2;padding:0 .12em;color:var(--rose);
    text-shadow:0 0 26px rgba(255,90,122,.5)}

  /* ---------- climax: eu te amo ---------- */
  .heart-wrap{width:clamp(120px,40vw,240px);filter:drop-shadow(0 0 42px rgba(225,29,58,.65));opacity:0;transform:scale(.4)}
  .bigheart{width:100%;height:auto;display:block}
  .sc-love.on .heart-wrap{animation:heartIn 1s cubic-bezier(.2,.9,.25,1) forwards .2s, hb 1.6s ease-in-out infinite 1.3s}
  @keyframes heartIn{to{opacity:1;transform:scale(1)}}
  @keyframes hb{0%,100%{transform:scale(1)}12%{transform:scale(1.15)}24%{transform:scale(1)}36%{transform:scale(1.08)}50%{transform:scale(1)}}
  .love{opacity:0;filter:blur(14px);transform:translateY(16px);font-family:'Parisienne',cursive;
    font-size:clamp(50px,15vw,112px);line-height:1.2;padding:0 .18em;
    background:linear-gradient(180deg,#ffffff,#ffd7de 42%,#ff5a7a);-webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;filter:drop-shadow(0 0 26px rgba(255,90,122,.6)) drop-shadow(0 2px 3px rgba(0,0,0,.55))}
  .sc-love.on .love{animation:rise 1.7s ease forwards 1.2s}
  .sig{opacity:0;filter:blur(8px);transform:translateY(12px);font-style:italic;
    font-size:clamp(16px,4.6vw,24px);color:var(--gold);letter-spacing:.03em}
  .sc-love.on .sig{animation:rise 1.5s ease forwards 2.8s}

  /* ---------- intro ---------- */
  .intro{position:absolute;inset:0;z-index:6;display:grid;place-items:center;cursor:pointer;
    background:radial-gradient(circle at 50% 50%, #12040a, #000 72%);transition:opacity 1.1s ease,visibility 1.1s}
  .intro.hide{opacity:0;visibility:hidden}
  .spark{width:60px;height:60px;margin:0 auto 26px;border-radius:50%;
    background:radial-gradient(circle,#fff6e2,#f3cd7f 42%,rgba(225,29,58,.4) 72%,transparent);
    box-shadow:0 0 46px rgba(243,205,127,.6);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.2);opacity:1}}
  .hi{font-family:'Parisienne',cursive;font-size:clamp(33px,11vw,58px);line-height:1.2;padding:0 .12em;color:#f6ddab;
    filter:drop-shadow(0 0 16px rgba(243,205,127,.5))}
  .tap{margin-top:14px;font-style:italic;letter-spacing:.26em;font-size:13px;color:var(--gold-soft);
    text-transform:lowercase;animation:fade 2.4s ease-in-out infinite}
  @keyframes fade{0%,100%{opacity:.35}50%{opacity:.9}}

  .replay{position:absolute;z-index:7;left:50%;bottom:max(3.4vh,env(safe-area-inset-bottom));transform:translateX(-50%);
    opacity:0;visibility:hidden;transition:opacity .8s ease .4s,visibility .8s;
    background:rgba(255,255,255,.05);border:1px solid rgba(243,205,127,.35);color:var(--gold-soft);
    font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;letter-spacing:.14em;
    padding:9px 20px;border-radius:100px;cursor:pointer;backdrop-filter:blur(4px)}
  .replay.show{opacity:.85;visibility:visible}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <canvas id="fx"></canvas>

    <section class="scene sc-rose">
      <div class="glow-red"></div>
      <div class="rose-holder"><div class="rose-fit" id="fit"><div class="rose" id="rose"></div></div></div>
      <p class="tiny">para voc&ecirc;&hellip;</p>
    </section>

    <section class="scene sc-name">
      <p class="pre">para a minha</p>
      <h1 class="name">Kamilly</h1>
    </section>

    <section class="scene sc-decl">
      <!-- === TROQUE A DECLARACAO AQUI === -->
      <p class="dl dl1">em um mundo inteiro de gente,</p>
      <p class="dl dl2">o meu cora&ccedil;&atilde;o escolheu</p>
      <p class="dl dl3">s&oacute; voc&ecirc;</p>
    </section>

    <section class="scene sc-love">
      <div class="heart-wrap">
        <svg class="bigheart" viewBox="0 0 32 29.6" xmlns="http://www.w3.org/2000/svg">
          <defs><radialGradient id="hg" cx="50%" cy="34%" r="72%">
            <stop offset="0%" stop-color="#ff8199"/><stop offset="52%" stop-color="#e11d3a"/><stop offset="100%" stop-color="#8a0b1e"/>
          </radialGradient></defs>
          <path fill="url(#hg)" d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4 c0,9.4,9.5,11.9,16,21.2c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
        </svg>
      </div>
      <h2 class="love">eu te amo</h2>
      <p class="sig">hoje, amanh&atilde; e para sempre &#129293;</p>
    </section>

    <div class="vig"></div>

    <audio id="song" src="musica.mp3" preload="auto" loop></audio>
    <button class="replay" id="replay">&#8635; ver de novo</button>

    <div class="intro" id="intro">
      <div>
        <div class="spark"></div>
        <div class="hi">Kamilly&hellip;</div>
        <div class="tap">toque para come&ccedil;ar</div>
      </div>
    </div>
  </div>

<script>
  /* pre-baixa a musica pro cache durante a intro, pra comecar sem atraso no toque */
  (function(){try{fetch('musica.mp3').then(function(r){return r.blob();}).catch(function(){});}catch(e){}})();

  /* rosa */
  (function(){
    var rose=document.getElementById('rose'),fit=document.getElementById('fit');
    var layers=[
      {n:9,w:78,h:122,c1:'#c8102e',c2:'#570713',off:0, base:.05},
      {n:8,w:66,h:104,c1:'#e11d3a',c2:'#7a0b1e',off:22,base:.22},
      {n:7,w:54,h:86, c1:'#f0304e',c2:'#960f24',off:12,base:.40},
      {n:6,w:42,h:66, c1:'#ff4f68',c2:'#c01330',off:30,base:.56},
      {n:5,w:30,h:48, c1:'#d11734',c2:'#460712',off:8, base:.72}];
    layers.forEach(function(L){for(var i=0;i<L.n;i++){var p=document.createElement('div');p.className='petal';
      p.style.setProperty('--w',L.w+'px');p.style.setProperty('--h',L.h+'px');
      p.style.setProperty('--c1',L.c1);p.style.setProperty('--c2',L.c2);
      p.style.setProperty('--deg',((360/L.n)*i+L.off)+'deg');p.style.setProperty('--d',(L.base+i*0.045)+'s');
      rose.appendChild(p);}});
    function f(){var w=document.querySelector('.rose-holder');fit.style.setProperty('--s',(w.clientWidth/380).toFixed(3));}
    f();addEventListener('resize',f);addEventListener('orientationchange',f);
  })();

  /* canvas: estrelas, poeira, petalas caindo, coracoes subindo */
  var FX={petals:false,hearts:false};
  (function(){
    var C=document.getElementById('fx'),X=C.getContext('2d'),W,H,DPR=Math.min(devicePixelRatio||1,2);
    var stars=[],dust=[],petals=[],hearts=[],tick=0;
    function size(){W=C.width=innerWidth*DPR;H=C.height=innerHeight*DPR;}
    function seed(){stars=[];for(var i=0;i<64;i++)stars.push({x:Math.random()*W,y:Math.random()*H*.9,r:(Math.random()*1.2+.3)*DPR,ph:Math.random()*6.3});
      dust=[];for(i=0;i<52;i++)dust.push({x:Math.random()*W,y:Math.random()*H,r:(Math.random()*1.6+.4)*DPR,sp:(Math.random()*.3+.06)*DPR,ph:Math.random()*6.3,a:.4+Math.random()*.6,dr:Math.random()*.5+.1});}
    size();seed();addEventListener('resize',function(){size();seed();});
    function petal(){petals.push({x:Math.random()*W,y:-20*DPR,vy:(Math.random()*.9+.5)*DPR,vx:(Math.random()-.5)*.6*DPR,rot:Math.random()*6.3,vr:(Math.random()-.5)*.05,s:(Math.random()*9+7)*DPR,a:.45+Math.random()*.4});}
    function heart(){hearts.push({x:Math.random()*W,y:H+24*DPR,vy:-(Math.random()*.75+.5)*DPR,vx:(Math.random()-.5)*.4*DPR,s:(Math.random()*10+7)*DPR,a:.55+Math.random()*.4,ph:Math.random()*6.3});}
    function drawPetal(p){X.save();X.translate(p.x,p.y);X.rotate(p.rot);X.globalAlpha=p.a;
      var g=X.createLinearGradient(0,-p.s,0,p.s);g.addColorStop(0,'#ff7d92');g.addColorStop(1,'#b3122e');
      X.fillStyle=g;X.beginPath();X.ellipse(0,0,p.s*.52,p.s,0,0,6.283);X.fill();X.restore();X.globalAlpha=1;}
    function drawHeart(x,y,s,a){X.save();X.translate(x,y);X.scale(s/18,s/18);X.globalAlpha=a;
      X.fillStyle='#e11d3a';X.shadowColor='rgba(225,29,58,.75)';X.shadowBlur=9;
      X.beginPath();X.moveTo(0,-4);
      X.bezierCurveTo(-4,-11,-15,-7,-15,1);X.bezierCurveTo(-15,8,-6,12,0,18);
      X.bezierCurveTo(6,12,15,8,15,1);X.bezierCurveTo(15,-7,4,-11,0,-4);
      X.closePath();X.fill();X.restore();X.shadowBlur=0;X.globalAlpha=1;}
    (function loop(t){X.clearRect(0,0,W,H);tick++;
      for(var i=0;i<stars.length;i++){var s=stars[i],tw=.35+.65*Math.abs(Math.sin(t/900+s.ph));
        X.beginPath();X.arc(s.x,s.y,s.r,0,6.283);X.fillStyle='rgba(255,241,214,'+(tw*.55)+')';X.fill();}
      for(i=0;i<dust.length;i++){var d=dust[i];d.y-=d.sp;d.x+=Math.sin(t/1100+d.ph)*.2*d.dr;
        if(d.y<-10){d.y=H+10;d.x=Math.random()*W;}var t2=.5+.5*Math.sin(t/650+d.ph);
        X.beginPath();X.arc(d.x,d.y,d.r,0,6.283);X.fillStyle='rgba(245,205,127,'+(0.1+0.5*t2*d.a)+')';
        X.shadowColor='rgba(245,197,107,.8)';X.shadowBlur=6*DPR;X.fill();X.shadowBlur=0;}
      if(FX.petals&&tick%7===0)petal();
      for(i=petals.length-1;i>=0;i--){var p=petals[i];p.y+=p.vy;p.x+=p.vx+Math.sin(t/800+p.rot)*.3;p.rot+=p.vr;
        if(p.y>H+30){petals.splice(i,1);continue;}drawPetal(p);}
      if(FX.hearts&&tick%9===0)heart();
      for(i=hearts.length-1;i>=0;i--){var h=hearts[i];h.y+=h.vy;h.x+=h.vx+Math.sin(t/700+h.ph)*.35;
        if(h.y<-30){hearts.splice(i,1);continue;}drawHeart(h.x,h.y,h.s,h.a);}
      requestAnimationFrame(loop);})(0);
  })();

  /* controlador de cenas */
  var order=['sc-rose','sc-name','sc-decl','sc-love'],durs=[5200,4600,6600,99999],timers=[];
  function activate(i){
    document.querySelectorAll('.scene').forEach(function(s){s.classList.remove('on');});
    document.querySelector('.'+order[i]).classList.add('on');
    FX.petals=(order[i]==='sc-decl'||order[i]==='sc-love');
    FX.hearts=(order[i]==='sc-love');
    if(order[i]==='sc-love'){ timers.push(setTimeout(function(){document.getElementById('replay').classList.add('show');},4200)); }
  }
  function play(){var t=0;timers.forEach(clearTimeout);timers=[];document.getElementById('replay').classList.remove('show');
    for(var i=0;i<order.length;i++){(function(idx,delay){timers.push(setTimeout(function(){activate(idx);},delay));})(i,t);t+=durs[i];}}

  (function(){
    var intro=document.getElementById('intro'),started=false;
    function go(){if(started)return;started=true;intro.classList.add('hide');play();var s=document.getElementById('song');if(s){s.volume=.6;s.play().catch(function(){});}}
    intro.addEventListener('click',go);intro.addEventListener('touchstart',function(){go();},{passive:true});
    document.getElementById('replay').addEventListener('click',function(e){e.stopPropagation();location.reload();});
  })();
</script>
</body>
</html>
